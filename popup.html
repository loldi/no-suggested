<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>No Suggested</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="hero">
      <div class="hero-top">
        <div class="title">
          <img src="icons/icon32.png" alt="" class="logo" />
          <h1>No Suggested</h1>
        </div>
        <label class="toggle" title="Enable / disable filtering">
          <input id="enabled-toggle" type="checkbox" checked />
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
        </label>
      </div>
      <p class="inline-stats" aria-live="polite">
        <b class="stat-num" id="stat-page">—</b> this page
        <span class="sep" aria-hidden="true">·</span>
        <b class="stat-num" id="stat-lifetime">0</b> lifetime
        <span class="sep" aria-hidden="true">·</span>
        <b class="stat-num" id="stat-manual">0</b> manual blocks
      </p>
    </header>

    <p id="status-banner" class="status-off" hidden>
      Filtering off — LinkedIn feed unchanged.
    </p>

    <section class="block-zone">
      <p class="explainer">
        Suggested posts hide automatically. Use manual block when something else
        slips through — you'll pick it directly on the feed.
      </p>
      <button id="pick-btn" class="block-btn" type="button">
        <span class="block-btn-text">
          <strong>Block a post manually</strong>
          <span class="block-hint" id="pick-hint">Click a feed card on the page to hide it permanently</span>
        </span>
        <kbd class="block-kbd">Alt+Shift+H</kbd>
      </button>
    </section>

    <section class="blocks-section">
      <div class="section-head">
        <h2>Manual blocks</h2>
        <button id="clear-all-btn" class="link-btn" type="button" hidden>Clear all</button>
      </div>
      <ul id="kill-list" class="blocks-list">
        <li class="empty">No manual blocks yet.</li>
      </ul>
    </section>

    <section class="settings">
      <label class="checkbox">
        <input id="badge-toggle" type="checkbox" checked />
        <span>Show count on toolbar icon</span>
      </label>
    </section>

    <footer class="footer">
      <a href="https://github.com/loldi/no-suggested" target="_blank" rel="noreferrer">github.com/loldi/no-suggested</a>
      <span id="version-tag"></span>
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
